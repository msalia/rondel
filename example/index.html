<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circular Code</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 36px;
    }

    .card-row {
      display: flex;
      gap: 24px;
      width: 100%;
      max-width: 1080px;
      align-items: flex-start;
    }

    @media (max-width: 720px) {
      .card-row { flex-direction: column; }
    }

    .card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 28px;
      flex: 1;
      min-width: 0;
      margin-bottom: 24px;
    }

    .card h2 {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 16px;
      color: #ccc;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0f0f0f;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #555; }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #fff;
      color: #000;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }

    .options {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .option {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 80px;
    }

    .option label {
      font-size: 11px;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .option select, .option input[type="number"] {
      padding: 8px 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #0f0f0f;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }

    #code-output {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100px;
      border-radius: 8px;
      background: #fff;
      padding: 20px;
    }

    #code-output svg {
      max-width: 100%;
      height: auto;
    }

    #code-output.empty {
      background: #111;
      border: 1px dashed #333;
      color: #555;
      font-size: 13px;
    }

    .decode-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #2a2a2a;
    }

    .decode-result {
      padding: 10px 14px;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      min-height: 20px;
      word-break: break-all;
    }

    .decode-result.success { border-color: #2d5a2d; color: #6cbf6c; }
    .decode-result.error { border-color: #5a2d2d; color: #bf6c6c; }

    .stats {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .stat {
      font-size: 12px;
      color: #666;
    }

    .stat span { color: #aaa; }

    .download-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .download-row button {
      flex: 1;
      background: #222;
      color: #ccc;
      border: 1px solid #333;
      font-size: 12px;
      padding: 8px 12px;
    }

    .video-container {
      border-radius: 8px;
      overflow: hidden;
      background: #111;
      border: 1px solid #333;
      min-height: 120px;
      position: relative;
    }

    .video-container video {
      width: 100%;
      display: block;
    }

    .video-container canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .scan-status {
      font-size: 13px;
      color: #777;
    }

    .scan-status.active { color: #6cbf6c; }
    .scan-status.error { color: #bf6c6c; }

    .debug-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .debug-step canvas {
      width: 120px;
      height: 120px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #111;
    }

    .debug-step span {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <h1>Circular Code</h1>
  <p class="subtitle">Encode text into circular barcodes with Reed-Solomon error correction</p>

  <div class="card-row">
    <div class="card" style="flex:1">
      <h2>Generate</h2>
      <div class="input-row">
        <input type="text" id="text-input" placeholder="Enter text or URL..." value="https://example.com">
        <button id="generate-btn">Generate</button>
      </div>
      <div class="options">
        <div class="option">
          <label>Rings</label>
          <select id="opt-rings">
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5" selected>5</option>
            <option value="6">6</option>
          </select>
        </div>
        <div class="option">
          <label>Segments</label>
          <select id="opt-segments">
            <option value="32">32</option>
            <option value="48" selected>48</option>
            <option value="64">64</option>
          </select>
        </div>
        <div class="option">
          <label>ECC Bytes</label>
          <select id="opt-ecc">
            <option value="8">8</option>
            <option value="16" selected>16</option>
            <option value="32">32</option>
          </select>
        </div>
        <div class="option">
          <label>Size</label>
          <input type="number" id="opt-size" value="400" min="100" max="800" step="50">
        </div>
        <div class="option">
          <label>Invert</label>
          <button type="button" id="opt-invert" style="padding:8px 10px; font-size:13px; background:#0f0f0f; color:#e0e0e0; border:1px solid #333; border-radius:6px; cursor:pointer; text-align:left">Off</button>
        </div>
      </div>
      <div id="code-output" class="empty">Enter text and click Generate</div>
      <div class="download-row" id="download-row" style="display:none">
        <button id="download-svg">Download SVG</button>
        <button id="download-png">Download PNG</button>
      </div>
      <div class="decode-section">
        <h2>Decode</h2>
        <div class="decode-result" id="decode-result"></div>
        <div class="stats" id="stats"></div>
        <div style="margin-top:12px">
          <button id="scan-image-btn" style="background:#222; color:#ccc; border:1px solid #333; font-size:12px; padding:8px 12px; width:100%">Scan from Image</button>
        </div>
        <div class="decode-result" id="scan-image-result" style="margin-top:8px; display:none"></div>
        <div id="scan-image-debug" style="display:none; margin-top:8px">
          <div style="display:flex; gap:6px; overflow-x:auto; padding-bottom:4px">
            <div class="debug-step"><canvas id="gen-dbg-warp" width="120" height="120"></canvas><span>Warp</span></div>
            <div class="debug-step"><canvas id="gen-dbg-sample" width="120" height="120"></canvas><span>Sample</span></div>
            <div class="debug-step"><canvas id="gen-dbg-result" width="120" height="120"></canvas><span>Result</span></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="flex:2">
      <h2>Scan</h2>
      <p style="font-size:13px; color:#777; margin-bottom:12px">
        Point your camera at a circular code to decode it.
      </p>
      <div class="video-container">
        <video id="scan-video" playsinline muted></video>
        <canvas id="scan-overlay"></canvas>
      </div>
      <div style="display:flex; gap:10px; margin-top:12px; align-items:center">
        <button id="scan-btn">Start Camera</button>
        <button id="resume-btn" style="display:none; background:#2d4a5a; color:#ccc; border:1px solid #377">Resume</button>
        <button id="stop-scan-btn" style="display:none; background:#5a2d2d; color:#ccc; border:1px solid #733">Stop</button>
        <div id="scan-status" class="scan-status"></div>
      </div>
      <p style="font-size:11px; color:#555; text-transform:uppercase; letter-spacing:0.5px; margin-top:12px; margin-bottom:6px">Decoded Data</p>
      <div class="decode-result" id="scan-result"></div>
      <div style="margin-top:8px; display:flex; align-items:center; gap:12px">
        <div id="model-status" style="font-size:12px; color:#555"></div>
      </div>
      <div style="margin-top:12px">
        <p style="font-size:11px; color:#555; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px">Pipeline</p>
        <div id="debug-pipeline" style="display:flex; gap:6px; overflow-x:auto; padding-bottom:4px">
          <div class="debug-step">
            <canvas id="dbg-capture" width="120" height="120"></canvas>
            <span>Capture</span>
          </div>
          <div class="debug-step">
            <canvas id="dbg-detect" width="120" height="120"></canvas>
            <span>Detect</span>
          </div>
          <div class="debug-step">
            <canvas id="dbg-warp" width="120" height="120"></canvas>
            <span>Warp</span>
          </div>
          <div class="debug-step">
            <canvas id="dbg-sample" width="120" height="120"></canvas>
            <span>Sample</span>
          </div>
          <div class="debug-step">
            <canvas id="dbg-result" width="120" height="120"></canvas>
            <span>Result</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
